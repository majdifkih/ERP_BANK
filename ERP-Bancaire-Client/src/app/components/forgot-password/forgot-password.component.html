<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <img src="/Logo_STB.png" alt="STB Bank Logo" class="logo-image" />
      <h1>Mot de passe oublié</h1>
      <p class="subtitle">Récupérez l’accès à votre compte</p>
    </div>

    <form (ngSubmit)="submit()" class="login-form">
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
      <input id="email" name="email" type="email" [(ngModel)]="email" placeholder="Entrez votre e-mail" required email
        class="form-input" />
      </div>

      <button type="submit" [disabled]="loading" class="submit-button">
        <span *ngIf="!loading">Envoyer le lien</span>
        <span *ngIf="loading">Envoi en cours...</span>
      </button>
    </form>

    <div class="info-message" *ngIf="message">{{ message }}</div>

    <div class="footer-info">
      <p>© 2026 ERP Bancaire. Tous droits réservés.</p>
      <p class="back-link" (click)="goToLogin()">Retour à la connexion</p>
    </div>
  </div>

  <div class="background-decoration"></div>
</div>
