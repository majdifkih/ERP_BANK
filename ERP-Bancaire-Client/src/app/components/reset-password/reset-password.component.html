<div class="reset-wrapper">
    <div class="reset-container">

        <div class="reset-header">
            <h2>Réinitialiser mot de passe</h2>
            <p class="subtitle">Choisissez un nouveau mot de passe</p>
        </div>

        <div class="reset-form">

            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" [(ngModel)]="newPassword" placeholder="Nouveau mot de passe"
                    class="form-input" />
            </div>

            <div class="form-group">
                <label>Confirmer mot de passe</label>
                <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirmer" class="form-input" />
            </div>

            <button (click)="submit()" class="submit-button" [disabled]="!newPassword || !confirmPassword">
                Valider
            </button>

            <p class="info-message" *ngIf="message">
                {{ message }}
            </p>

        </div>
    </div>
</div>
